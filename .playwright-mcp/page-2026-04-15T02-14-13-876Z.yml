          - separator [ref=e1517]
          - heading "[Operator] Shared plan contention and capacity behavior ¶" [level=3] [ref=e1518]:
            - text: "[Operator] Shared plan contention and capacity behavior"
            - link "¶" [ref=e1519] [cursor=pointer]:
              - /url: "#operator-shared-plan-contention-and-capacity-behavior"
          - paragraph [ref=e1520]: An App Service Plan is the compute boundary. Apps in the same plan compete for shared CPU, memory, and I/O capacity.
          - heading "What shares plan resources ¶" [level=4] [ref=e1521]:
            - text: What shares plan resources
            - link "¶" [ref=e1522] [cursor=pointer]:
              - /url: "#what-shares-plan-resources"
          - paragraph [ref=e1523]: "Within one plan, shared compute can be consumed by:"
          - list [ref=e1524]:
            - listitem [ref=e1525]: Multiple web apps
            - listitem [ref=e1526]: Deployment slots
            - listitem [ref=e1527]: Diagnostic workloads and log generation
            - listitem [ref=e1528]: Backup operations
            - listitem [ref=e1529]: WebJobs
          - paragraph [ref=e1530]: This is why app-only metrics can hide root cause. Plan-level visibility is mandatory.
          - 'heading "Monitoring strategy: app and plan together ¶" [level=4] [ref=e1531]':
            - text: "Monitoring strategy: app and plan together"
            - link "¶" [ref=e1532] [cursor=pointer]:
              - /url: "#monitoring-strategy-app-and-plan-together"
          - paragraph [ref=e1533]: "Track at least:"
          - list [ref=e1534]:
            - listitem [ref=e1535]: Plan CPU percentage
            - listitem [ref=e1536]: Plan memory working set pressure
            - listitem [ref=e1537]: HTTP queue/latency signals at app level
            - listitem [ref=e1538]: Restart count and instance health
          - 'heading "Example: inspect plan for an app ¶" [level=4] [ref=e1539]':
            - text: "Example: inspect plan for an app"
            - link "¶" [ref=e1540] [cursor=pointer]:
