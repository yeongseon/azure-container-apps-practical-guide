        - article [ref=e934]:
          - heading "How App Service Works ¶" [level=1] [ref=e935]:
            - text: How App Service Works
            - link "¶" [ref=e936] [cursor=pointer]:
              - /url: "#how-app-service-works"
          - paragraph [ref=e937]: Azure App Service is a managed hosting platform for web apps and APIs. You focus on application behavior, while Microsoft operates fleet management, patching, frontend routing, and worker lifecycle. This page builds the mental model you need for design reviews, deployment decisions, and production troubleshooting.
          - generic [ref=e938]:
            - paragraph [ref=e939]: Scope of this page
            - paragraph [ref=e940]:
              - text: This page explains the
              - strong [ref=e941]: common mental model
              - text: for Azure App Service — architecture, deployment, storage, startup, and diagnostics. Some operational details lean toward
              - strong [ref=e942]: Linux and container
              - text: hosting. Where behavior differs by hosting mode (Windows code, Linux built-in, Linux custom container), the text calls it out explicitly. For isolated environments (ASE), see
              - 'link "Microsoft Learn: App Service Environment overview" [ref=e943] [cursor=pointer]':
                - /url: https://learn.microsoft.com/azure/app-service/environment/overview
              - text: .
          - generic [ref=e944]:
            - paragraph [ref=e945]: Community guide disclaimer
            - paragraph [ref=e946]: This field guide is a community-maintained learning resource. For authoritative platform behavior, always confirm with Microsoft Learn and Azure product documentation before production changes.
