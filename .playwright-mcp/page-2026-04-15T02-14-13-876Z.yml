          - paragraph [ref=e1421]: "Why this is risky:"
          - list [ref=e1422]:
            - listitem [ref=e1423]: Shared network filesystem characteristics can introduce lock contention.
            - listitem [ref=e1424]: Latency variance affects transaction behavior.
            - listitem [ref=e1425]: Multi-instance concurrency increases corruption/timeout risk.
          - paragraph [ref=e1426]: "Preferred approach:"
