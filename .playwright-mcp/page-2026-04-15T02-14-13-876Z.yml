          - paragraph [ref=e1164]: "Learn references:"
          - list [ref=e1165]:
            - listitem [ref=e1166]:
              - link "Manage an App Service app in Azure CLI" [ref=e1167] [cursor=pointer]:
                - /url: https://learn.microsoft.com/azure/app-service/scripts/cli-web-app
            - listitem [ref=e1168]:
