name: Application Tests

on:
  pull_request:
    paths:
      - 'apps/java-springboot/**'
      - 'apps/python/**'
      - 'apps/nodejs/**'
      - 'apps/dotnet-aspnetcore/**'
      - 'apps/**/*.sh'
      - 'jobs/**/*.sh'
      - 'labs/**/*.sh'
      - 'infra/**/*.sh'
      - 'scripts/**/*.sh'
      - 'apps/**/*.bicep'
      - 'jobs/**/*.bicep'
      - 'labs/**/*.bicep'
      - 'infra/**/*.bicep'
      - '.github/workflows/app-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/java-springboot/**'
      - 'apps/python/**'
      - 'apps/nodejs/**'
      - 'apps/dotnet-aspnetcore/**'
      - 'apps/**/*.sh'
      - 'jobs/**/*.sh'
      - 'labs/**/*.sh'
      - 'infra/**/*.sh'
      - 'scripts/**/*.sh'
      - 'apps/**/*.bicep'
      - 'jobs/**/*.bicep'
      - 'labs/**/*.bicep'
      - 'infra/**/*.bicep'
      - '.github/workflows/app-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scripts:
    name: Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate shell syntax
        run: |
          find apps jobs labs infra scripts -type f -name '*.sh' -print0 | xargs -0 -r bash -n

      - name: Run ShellCheck (errors block)
        run: |
          find apps jobs labs infra scripts -type f -name '*.sh' -print0 | xargs -0 -r shellcheck --severity=error

      - name: Report ShellCheck backlog (advisory)
        run: |
          find apps jobs labs infra scripts -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
        continue-on-error: true  # Lenient: surfaces pre-existing warning/info/style backlog without blocking PRs.

  bicep:
    name: Bicep Templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Bicep templates
        uses: azure/cli@v2
        with:
          inlineScript: |
            find apps jobs labs infra -type f -name '*.bicep' -print | sort | while IFS= read -r file; do
              echo "Building ${file}"
              az bicep build --file "${file}" --stdout >/dev/null
            done

  java-springboot:
    name: Java Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven tests
        working-directory: apps/java-springboot
        run: mvn --batch-mode test

  python:
    name: Python (Flask + Gunicorn)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/python/requirements.txt

      - name: Install dependencies
        working-directory: apps/python
        run: pip install --requirement requirements.txt

      - name: Byte-compile sources
        working-directory: apps/python
        run: python -m compileall src

      - name: Health smoke test
        working-directory: apps/python
        env:
          PORT: '8000'
          WEB_CONCURRENCY: '2'
        run: |
          gunicorn --config gunicorn.conf.py --chdir src "app:app" &
          SERVER_PID=$!
          trap 'kill "${SERVER_PID}" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8000/health; then
              echo ""
              echo "Health check passed on attempt ${attempt}."
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed: /health did not return 200 within 30s." >&2
          exit 1

  nodejs:
    name: Node.js (Express)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/nodejs
        run: npm install

      - name: Health smoke test
        working-directory: apps/nodejs
        env:
          PORT: '8000'
        run: |
          npm start &
          SERVER_PID=$!
          trap 'kill "${SERVER_PID}" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8000/health; then
              echo ""
              echo "Health check passed on attempt ${attempt}."
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed: /health did not return 200 within 30s." >&2
          exit 1

  dotnet:
    name: .NET (ASP.NET Core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        working-directory: apps/dotnet-aspnetcore
        run: dotnet build --configuration Release

      - name: Health smoke test
        working-directory: apps/dotnet-aspnetcore
        env:
          PORT: '8000'
        run: |
          dotnet run --configuration Release --no-build &
          SERVER_PID=$!
          trap 'kill "${SERVER_PID}" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8000/health; then
              echo ""
              echo "Health check passed on attempt ${attempt}."
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed: /health did not return 200 within 30s." >&2
          exit 1
