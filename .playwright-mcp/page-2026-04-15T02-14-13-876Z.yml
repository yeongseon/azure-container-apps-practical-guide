            - text: "[Operator] Warm-up and deployment safety"
            - link "¶" [ref=e1475] [cursor=pointer]:
              - /url: "#operator-warm-up-and-deployment-safety"
          - paragraph [ref=e1476]: Deployment safety is about controlling user impact while new code starts.
          - heading "Slot swap mechanics ¶" [level=4] [ref=e1477]:
            - text: Slot swap mechanics
            - link "¶" [ref=e1478] [cursor=pointer]:
              - /url: "#slot-swap-mechanics"
          - paragraph [ref=e1479]: "When using deployment slots:"
          - list [ref=e1480]:
            - listitem [ref=e1481]: Deploy to source slot.
            - listitem [ref=e1482]: Source slot warms up.
            - listitem [ref=e1483]: Target (production) stays online during warm-up.
            - listitem [ref=e1484]: Swap happens after readiness checks.
          - heading "Custom swap warm-up settings ¶" [level=4] [ref=e1486]:
            - text: Custom swap warm-up settings
            - link "¶" [ref=e1487] [cursor=pointer]:
              - /url: "#custom-swap-warm-up-settings"
          - list [ref=e1488]:
            - listitem [ref=e1489]:
              - code [ref=e1490]: WEBSITE_SWAP_WARMUP_PING_PATH
            - listitem [ref=e1491]:
              - code [ref=e1492]: WEBSITE_SWAP_WARMUP_PING_STATUSES
          - paragraph [ref=e1493]: Use these to align swap readiness with your app’s real warm-up endpoint and expected status codes.
          - heading "Important slot constraints ¶" [level=4] [ref=e1494]:
            - text: Important slot constraints
            - link "¶" [ref=e1495] [cursor=pointer]:
              - /url: "#important-slot-constraints"
          - list [ref=e1496]:
            - listitem [ref=e1497]:
              - text: Deployment slots require
              - strong [ref=e1498]: Standard tier or higher
              - text: .
            - listitem [ref=e1499]:
              - text: Auto swap is
              - strong [ref=e1500]: not supported
              - text: on Linux web apps / Web App for Containers.
          - heading "If slots are not available ¶" [level=4] [ref=e1501]:
            - text: If slots are not available
            - link "¶" [ref=e1502] [cursor=pointer]:
              - /url: "#if-slots-are-not-available"
          - paragraph [ref=e1503]: "Use one or more alternatives:"
          - list [ref=e1504]:
            - listitem [ref=e1505]: Artifact rollback (redeploy previous known-good package)
            - listitem [ref=e1506]: Run-from-package with previous package version
            - listitem [ref=e1507]: Blue-green traffic strategy in CI/CD workflow (external routing/control)
          - generic [ref=e1508]:
            - paragraph [ref=e1509]: Baseline should be tier-aware
            - paragraph [ref=e1510]: Do not assume slot-based rollback is universally available. Your operational baseline must include a rollback method that matches your SKU and hosting mode.
          - paragraph [ref=e1511]: "Learn references:"
          - list [ref=e1512]:
            - listitem [ref=e1513]:
              - link "Set up staging environments in App Service" [ref=e1514] [cursor=pointer]:
