                - /url: https://learn.microsoft.com/azure/app-service/configure-common
          - separator [ref=e1170]
          - 'heading "[Beginner] Runtime plane: how requests are served ¶" [level=3] [ref=e1171]':
            - text: "[Beginner] Runtime plane: how requests are served"
            - link "¶" [ref=e1172] [cursor=pointer]:
              - /url: "#beginner-runtime-plane-how-requests-are-served"
          - paragraph [ref=e1173]: At runtime, App Service frontends terminate inbound connections and route traffic to healthy worker instances.
          - heading "Runtime path and warm instance selection ¶" [level=4] [ref=e1174]:
            - text: Runtime path and warm instance selection
            - link "¶" [ref=e1175] [cursor=pointer]:
              - /url: "#runtime-path-and-warm-instance-selection"
          - heading "Instance lifecycle realities ¶" [level=4] [ref=e1177]:
            - text: Instance lifecycle realities
            - link "¶" [ref=e1178] [cursor=pointer]:
              - /url: "#instance-lifecycle-realities"
          - list [ref=e1179]:
            - listitem [ref=e1180]: Instances can recycle during platform maintenance.
            - listitem [ref=e1181]: Scale-out adds new instances that must warm up.
            - listitem [ref=e1182]: Scale-in removes instances and in-flight behavior must tolerate it.
          - paragraph [ref=e1183]: "Design implications:"
          - list [ref=e1184]:
            - listitem [ref=e1185]: Prefer stateless app nodes.
            - listitem [ref=e1186]: Keep startup idempotent.
            - listitem [ref=e1187]: Externalize durable state.
            - listitem [ref=e1188]: Ensure graceful shutdown behavior.
          - heading "Runtime observability basics ¶" [level=4] [ref=e1189]:
            - text: Runtime observability basics
            - link "¶" [ref=e1190] [cursor=pointer]:
              - /url: "#runtime-observability-basics"
          - list [ref=e1191]:
            - listitem [ref=e1192]: Request failures (HTTP 5xx, latency spikes) are runtime symptoms.
            - listitem [ref=e1193]: Management-plane metrics alone are insufficient.
            - listitem [ref=e1194]: Log correlation should include timestamp, instance, and request identifiers.
