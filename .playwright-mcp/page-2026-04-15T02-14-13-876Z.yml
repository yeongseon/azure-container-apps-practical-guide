          - paragraph [ref=e1438]: "Startup success is a contract between your app and the platform:"
          - list [ref=e1439]:
            - listitem [ref=e1440]: App listens on expected port model
            - listitem [ref=e1441]: App initializes within limits
            - listitem [ref=e1442]: Health endpoint reflects readiness truthfully
            - listitem [ref=e1443]: App handles termination gracefully
          - heading "Health Check behavior details ¶" [level=4] [ref=e1444]:
            - text: Health Check behavior details
            - link "¶" [ref=e1445] [cursor=pointer]:
              - /url: "#health-check-behavior-details"
          - paragraph [ref=e1446]: Health Check is more than a monitoring toggle; it is part of runtime traffic safety.
          - paragraph [ref=e1447]: "Important behaviors:"
          - list [ref=e1448]:
            - listitem [ref=e1449]:
              - text: Health endpoint should return
              - strong [ref=e1450]: 200 only when fully warmed
              - text: .
            - listitem [ref=e1451]:
              - text: If endpoint responds with
              - strong [ref=e1452]: 302 redirect
              - text: ", Health Check does"
              - strong [ref=e1453]: not
              - text: follow redirect as success.
            - listitem [ref=e1454]:
              - text: A
              - strong [ref=e1455]: 1-minute timeout
              - text: generally counts as unhealthy.
            - listitem [ref=e1456]:
              - text: Most effective with
              - strong [ref=e1457]: 2+ instances
              - text: (single instance has limited failover value).
            - listitem [ref=e1458]: Used as a readiness gate during scale-out and recovery flows.
          - heading "Example health endpoint design rules ¶" [level=4] [ref=e1460]:
            - text: Example health endpoint design rules
            - link "¶" [ref=e1461] [cursor=pointer]:
              - /url: "#example-health-endpoint-design-rules"
          - list [ref=e1462]:
            - listitem [ref=e1463]: Avoid expensive deep checks on every probe call.
            - listitem [ref=e1464]: Confirm critical dependencies needed for serving traffic.
            - listitem [ref=e1465]: Return explicit non-200 when app is not ready.
            - listitem [ref=e1466]: Keep response fast and deterministic.
          - paragraph [ref=e1467]: "Learn references:"
          - list [ref=e1468]:
            - listitem [ref=e1469]:
              - link "Monitor App Service instances by using Health Check" [ref=e1470] [cursor=pointer]:
                - /url: https://learn.microsoft.com/azure/app-service/monitor-instances-health-check
            - listitem [ref=e1471]:
              - link "Reliability in App Service" [ref=e1472] [cursor=pointer]:
                - /url: https://learn.microsoft.com/azure/reliability/reliability-app-service
