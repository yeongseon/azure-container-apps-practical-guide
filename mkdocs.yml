  - Platform:
    - platform/index.md
    - Architecture:
      - Resource Relationships: platform/architecture/resource-relationships.md
    - Environments: platform/environments/index.md
    - Revisions: platform/revisions/index.md
    - Scaling: platform/scaling/index.md
    - Networking:
      - platform/networking/index.md
      - VNet Integration: platform/networking/vnet-integration.md
      - Private Endpoints: platform/networking/private-endpoints.md
      - Egress Control: platform/networking/egress-control.md
