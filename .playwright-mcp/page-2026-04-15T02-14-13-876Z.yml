          - 'heading "[Beginner] Management plane: what you configure ¶" [level=3] [ref=e1122]':
            - text: "[Beginner] Management plane: what you configure"
            - link "¶" [ref=e1123] [cursor=pointer]:
              - /url: "#beginner-management-plane-what-you-configure"
          - paragraph [ref=e1124]: The management plane is where desired state is declared.
          - paragraph [ref=e1125]: "Typical objects and settings:"
          - list [ref=e1126]:
            - listitem [ref=e1127]: App Service Plan SKU and instance count
            - listitem [ref=e1128]: App settings and connection strings
            - listitem [ref=e1129]: Deployment slots and slot settings
            - listitem [ref=e1130]: Custom domains and TLS certificates
            - listitem [ref=e1131]: Access restrictions
            - listitem [ref=e1132]: Identity settings (system/user-assigned managed identity)
            - listitem [ref=e1133]: Backup and restore configuration
          - heading "Why management-plane changes can restart runtime ¶" [level=4] [ref=e1134]:
            - text: Why management-plane changes can restart runtime
            - link "¶" [ref=e1135] [cursor=pointer]:
              - /url: "#why-management-plane-changes-can-restart-runtime"
          - paragraph [ref=e1136]: Many settings are consumed at process/container start. When changed, App Service recycles processes to enforce consistency.
          - paragraph [ref=e1137]: "Common recycle triggers:"
          - list [ref=e1138]:
            - listitem [ref=e1139]: App settings change
            - listitem [ref=e1140]: Startup command change
            - listitem [ref=e1141]: Stack/runtime configuration change
            - listitem [ref=e1142]: Slot swap
            - listitem [ref=e1143]: Scale up/down or scale in/out
          - 'heading "Example: inspect current app state with CLI ¶" [level=4] [ref=e1144]':
            - text: "Example: inspect current app state with CLI"
            - link "¶" [ref=e1145] [cursor=pointer]:
              - /url: "#example-inspect-current-app-state-with-cli"
          - generic [ref=e1147]:
            - navigation [ref=e1148]:
              - button "Copy to clipboard" [ref=e1149] [cursor=pointer]
            - code [ref=e1150]: "az webapp show \\ --resource-group \"$RG\" \\ --name \"$APP_NAME\" \\ --query \"{state:state, hostNames:hostNames, httpsOnly:httpsOnly, serverFarmId:serverFarmId}\" \\ --output json"
          - paragraph [ref=e1151]: "Example output (PII masked):"
          - generic [ref=e1153]:
