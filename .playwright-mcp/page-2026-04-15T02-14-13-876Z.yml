          - heading "Ephemeral storage ¶" [level=4] [ref=e1362]:
            - text: Ephemeral storage
            - link "¶" [ref=e1363] [cursor=pointer]:
              - /url: "#ephemeral-storage"
          - paragraph [ref=e1364]: "Characteristics:"
          - list [ref=e1365]:
            - listitem [ref=e1366]: Fast local I/O
            - listitem [ref=e1367]: Instance-scoped
            - listitem [ref=e1368]: Lost on recycle/replacement
            - listitem [ref=e1369]: Not shared across scaled-out instances
          - paragraph [ref=e1370]: "Good uses:"
          - list [ref=e1371]:
            - listitem [ref=e1372]: Temporary upload staging
            - listitem [ref=e1373]: Transient cache files
            - listitem [ref=e1374]: Intermediate processing artifacts
          - paragraph [ref=e1375]: "Bad uses:"
          - list [ref=e1376]:
            - listitem [ref=e1377]: User data requiring durability
            - listitem [ref=e1378]: Cross-instance coordination files
            - listitem [ref=e1379]: Any state you need after restart
